name: taal
description: "Free, open-source instrument tutoring with real-time MIDI feedback."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_rust_bridge: 2.12.0
  path_provider: ^2.1.5
  taal_core:
    path: rust_builder

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
